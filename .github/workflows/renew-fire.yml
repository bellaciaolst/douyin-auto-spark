name: 🚀 续一次火

on:
  workflow_dispatch:
  schedule:
    - cron: "50 1 * * *"
      timezone: "Asia/Shanghai"

jobs:
  run:
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
    timeout-minutes: 15

    steps:
      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v6

      - name: 缓存 Bun 安装
        uses: actions/cache@v4
        with:
          path: ~/.bun
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: 缓存依赖
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: 安装 unzip (Install unzip)
        run: apt-get update && apt-get install -y unzip

      - name: 安装 Bun (Set up Bun)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装运行时依赖 (Install dependencies)
        run: bun install --production

      - name: 续一次火 (Run spark job)
        env:
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          DOUYIN_TARGET_NAMES: ${{ secrets.DOUYIN_TARGET_NAMES }}
        run: bun src/main.ts
