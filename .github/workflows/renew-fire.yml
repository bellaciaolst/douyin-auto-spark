name: 🚀 续一次火

on:
  workflow_dispatch: # 保留手动触发，方便你随时测试
  schedule:
    # 🎯 每小时的第 25 分钟执行一次
    # 故意错开整点（00分），避开服务器拥堵，触发成功率极高
    - cron: "25 */1 * * *"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    
    # 下面的 steps 保持你原来的内容完全不变...
    steps:
      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v4
# ... 后面保持原样
